<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📱 Number Gen - Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Roboto',sans-serif;}
body{background:linear-gradient(135deg,#1f1c2c,#928dab);height:100vh;display:flex;justify-content:center;align-items:center;color:#fff;}
.container{width:400px;text-align:center;}
.title{font-size:36px;font-weight:700;margin-bottom:5px;text-shadow:0 2px 10px rgba(0,0,0,0.3);}
.credit{font-size:13px;color:#ccc;margin-bottom:20px;}
.card{background:rgba(255,255,255,0.05);border-radius:25px;padding:35px 25px;backdrop-filter:blur(20px);box-shadow:0 8px 30px rgba(0,0,0,0.5);transition:transform 0.3s ease,box-shadow 0.3s ease;}
.card:hover{transform:translateY(-5px);box-shadow:0 15px 40px rgba(0,0,0,0.6);}
input,select{width:100%;padding:14px 12px;margin:10px 0;border:none;border-radius:12px;background:rgba(255,255,255,0.1);color:#fff;font-size:15px;transition:0.3s;}
input:focus,select:focus{outline:none;background:rgba(255,255,255,0.2);}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:12px;font-size:16px;font-weight:500;color:#fff;cursor:pointer;background:linear-gradient(90deg,#00c6ff,#0072ff);transition:0.3s;}
button:hover{background:linear-gradient(90deg,#0072ff,#00c6ff);}
.progress{width:100%;height:12px;background:rgba(255,255,255,0.1);border-radius:12px;margin-top:20px;overflow:hidden;}
.bar{height:100%;width:0%;background:linear-gradient(90deg,#00c6ff,#0072ff);border-radius:12px;transition:width 0.2s ease;}
.percent{margin-top:8px;font-weight:500;font-size:14px;}
::placeholder{color:#ddd;}
@media(max-width:450px){.container{width:90%;}}
</style>
</head>
<body>
<div class="container">
    <div class="title">📱 Number Gen</div>
    <div class="credit">credit: @Fuckers_vai</div>

    <div class="card">
        <input type="text" id="prefix" placeholder="Prefix (optional)">
        <input type="number" id="length" placeholder="Length (Min 9)">
        <input type="number" id="count" placeholder="Quantity">

        <button onclick="generate()">⚡ Generate</button>
        <button onclick="download('csv')">📥 Download CSV</button>
        <button onclick="download('txt')">📥 Download TXT</button>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>
        <div class="percent" id="percent">0%</div>
    </div>
</div>

<script>
let numbers = []; // স্টোর করার জন্য

function genNum(prefix, length){
    let remain = length - prefix.length;
    let num = prefix;
    for(let i=0;i<remain;i++){
        num += Math.floor(Math.random()*10);
    }
    return num;
}

async function generate(){
    let prefix = document.getElementById("prefix").value.replace(/\D/g,'');
    let length = parseInt(document.getElementById("length").value);
    let count = parseInt(document.getElementById("count").value);

    if(!length || length<9){alert("Minimum 9 digits required!"); return;}
    if(!count || count<=0){alert("Invalid quantity!"); return;}

    numbers = []; // নতুন জেনারেশনের জন্য রিসেট
    let chunk = 50000;

    for(let i=0;i<count;i++){
        numbers.push(genNum(prefix,length));

        if(i % chunk === 0){
            let p = Math.floor((i/count)*100);
            document.getElementById("bar").style.width = p+"%";
            document.getElementById("percent").innerText = p+"%";
            await new Promise(r=>setTimeout(r,1));
        }
    }

    document.getElementById("bar").style.width="100%";
    document.getElementById("percent").innerText="100%";
    alert("✅ Number generation complete! Now download as CSV or TXT.");
}

function download(format){
    if(numbers.length===0){alert("Please generate numbers first!"); return;}

    let content = format==='csv' ? "Number\n"+numbers.join("\n") : numbers.join("\n");
    let blob = new Blob([content], {type:"text/plain"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = format==='csv' ? "numbers.csv" : "numbers.txt";
    a.click();
}
</script>
</body>
</html>

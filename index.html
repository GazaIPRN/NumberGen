<!DOCTYPE html>
<html>
<head>
    <title>Number Gen</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            text-align: center;
            width: 350px;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
        }

        .credit {
            font-size: 13px;
            color: #ccc;
            margin-bottom: 20px;
        }

        .card {
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        input::placeholder {
            color: #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
        }

        .progress {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        .bar {
            height: 100%;
            width: 0%;
            background: #00c6ff;
            transition: 0.3s;
        }

        .percent {
            margin-top: 5px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="title">📱 Number Gen</div>
    <div class="credit">credit: @Fuckers_vai</div>

    <div class="card">
        <input type="text" id="prefix" placeholder="Prefix (optional)">
        <input type="number" id="length" placeholder="Length (Min 9)">
        <input type="number" id="count" placeholder="Quantity">

        <button onclick="generate()">⚡ Generate</button>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>

        <div class="percent" id="percent">0%</div>
    </div>
</div>

<script>
function genNum(prefix, length) {
    let remain = length - prefix.length;
    let num = prefix;
    for (let i = 0; i < remain; i++) {
        num += Math.floor(Math.random() * 10);
    }
    return num;
}

async function generate() {
    let prefix = document.getElementById("prefix").value.replace(/\D/g, '');
    let length = parseInt(document.getElementById("length").value);
    let count = parseInt(document.getElementById("count").value);

    if (!length || length < 9) {
        alert("Minimum 9 digits");
        return;
    }

    if (!count || count <= 0) {
        alert("Invalid quantity");
        return;
    }

    let numbers = [];
    let chunk = 50000;

    for (let i = 0; i < count; i++) {
        numbers.push(genNum(prefix, length));

        if (i % chunk === 0) {
            let p = Math.floor((i / count) * 100);
            document.getElementById("bar").style.width = p + "%";
            document.getElementById("percent").innerText = p + "%";
            await new Promise(r => setTimeout(r, 1));
        }
    }

    document.getElementById("bar").style.width = "100%";
    document.getElementById("percent").innerText = "100%";

    let csv = "Number\n" + numbers.join("\n");
    let blob = new Blob([csv], { type: "text/csv" });

    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "numbers.csv";
    a.click();
}
</script>

</body>
</html>
